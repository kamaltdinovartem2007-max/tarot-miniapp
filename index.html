<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Расклады Таро</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #1a1420;
    --veil:   #2b1f35;
    --dust:   #4a3860;
    --gold:   #c9a96e;
    --silver: #b8afc8;
    --mist:   #e8e2f0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: var(--mist);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: 80px;
  }
  #sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); opacity: 0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0;transform:scale(.8)} 50%{opacity:var(--op,.5);transform:scale(1)}
  }
  .layer { position: relative; z-index: 1; }
  .screen { display: none; padding: 1.5rem; }
  .screen.active { display: block; }

  /* Home */
  .home-header { text-align: center; padding: 2.5rem 1rem 2rem; }
  .moon {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 35% 38%, #ede0b0, #c9a96e 50%, #8a6a30);
    box-shadow: 0 0 40px 12px rgba(201,169,110,.3);
    margin: 0 auto 1.2rem;
    animation: mpulse 5s ease-in-out infinite;
  }
  @keyframes mpulse {
    0%,100%{box-shadow:0 0 40px 12px rgba(201,169,110,.3)}
    50%{box-shadow:0 0 60px 20px rgba(201,169,110,.45)}
  }
  .home-header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2rem; line-height: 1.15; color: var(--mist); }
  .home-header h1 em { font-style: italic; color: var(--gold); }
  .home-header p { font-size: .85rem; color: var(--silver); margin-top: .7rem; }
  .user-greeting { font-size: .78rem; color: var(--gold); letter-spacing: .1em; margin-bottom: .4rem; text-transform: uppercase; opacity: .85; }

  /* Nav tabs */
  .nav-tabs {
    display: flex; gap: 0; margin: 0 -1.5rem 1.5rem;
    border-bottom: 1px solid var(--dust);
  }
  .nav-tab {
    flex: 1; text-align: center; padding: .75rem .5rem;
    font-size: .75rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--silver); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* Spreads */
  .spreads-list { display: flex; flex-direction: column; gap: .75rem; }
  .spread-item {
    display: flex; align-items: center; gap: 1rem;
    background: var(--veil); padding: 1rem 1.2rem;
    cursor: pointer; border: 1px solid transparent;
    transition: border-color .2s, background .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .spread-item:active, .spread-item.selected { border-color: var(--gold); background: #312040; }
  .spread-item .icon { font-size: 1.5rem; flex-shrink: 0; }
  .spread-item .info { flex: 1; }
  .spread-item .info .name { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--mist); }
  .spread-item .info .desc { font-size: .78rem; color: var(--silver); margin-top: .1rem; }
  .spread-item .price { margin-left: auto; flex-shrink: 0; font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gold); }

  /* History */
  .history-list { display: flex; flex-direction: column; gap: .75rem; }
  .history-item {
    background: var(--veil); padding: 1rem 1.2rem;
    border-left: 3px solid var(--dust);
  }
  .history-item.status-pending  { border-left-color: #f0c040; }
  .history-item.status-accepted { border-left-color: #6fcf97; }
  .history-item.status-done     { border-left-color: #c9a96e; }
  .history-item .h-spread { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--mist); }
  .history-item .h-meta { font-size: .78rem; color: var(--silver); margin-top: .2rem; }
  .history-item .h-status { font-size: .8rem; margin-top: .4rem; }
  .empty-history { text-align: center; padding: 3rem 1rem; color: var(--silver); }
  .empty-history .big { font-size: 2.5rem; margin-bottom: 1rem; }

  /* Form */
  .form-header { display: flex; align-items: center; gap: .8rem; margin-bottom: 1.8rem; }
  .back-btn { background: none; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 0; line-height: 1; }
  .form-header h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 1.4rem; color: var(--mist); }
  .selected-spread-badge {
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid rgba(201,169,110,.4); padding: .5rem .9rem; margin-bottom: 1.5rem;
  }
  .badge-name { font-size: .85rem; color: var(--gold); }
  .badge-price { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--mist); }
  .form-group { margin-bottom: 1.4rem; }
  label { display: block; font-size: .68rem; letter-spacing: .15em; text-transform: uppercase; color: var(--silver); margin-bottom: .4rem; }
  input, textarea {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid var(--dust); color: var(--mist);
    font-family: 'Jost', sans-serif; font-weight: 300; font-size: .95rem;
    padding: .6rem 0; outline: none; transition: border-color .2s;
  }
  input::placeholder, textarea::placeholder { color: var(--dust); }
  input:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; min-height: 80px; }
  .field-error { font-size: .72rem; color: #e07070; margin-top: .3rem; display: none; }
  .field-error.show { display: block; }

  /* Success */
  .success-screen { text-align: center; padding: 4rem 2rem; }
  .success-screen .big { font-size: 3.5rem; margin-bottom: 1.2rem; }
  .success-screen h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 1.9rem; color: var(--mist); margin-bottom: .7rem; }
  .success-screen p { color: var(--silver); font-size: .9rem; }
  .divider { height: 1px; background: var(--veil); margin: 1.5rem 0; }
</style>
</head>
<body>

<div id="sky" aria-hidden="true"></div>

<!-- HOME -->
<div class="screen layer active" id="screen-home">
  <div class="home-header">
    <div class="moon" aria-hidden="true"></div>
    <p class="user-greeting" id="greeting">Добро пожаловать</p>
    <h1>Послание из <em>карт</em></h1>
    <p>Выбери расклад — и запишись на консультацию</p>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-spreads" onclick="switchTab('spreads')">🔮 Расклады</div>
    <div class="nav-tab" id="tab-history" onclick="switchTab('history')">📋 Мои заявки</div>
  </div>

  <div id="panel-spreads">
    <div class="spreads-list" id="spreads-list"></div>
  </div>

  <div id="panel-history" style="display:none">
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- FORM -->
<div class="screen layer" id="screen-form">
  <div class="form-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <h2>Запись на расклад</h2>
  </div>
  <div class="selected-spread-badge">
    <span class="badge-name" id="badge-name"></span>
    <span class="badge-price" id="badge-price"></span>
  </div>
  <div class="form-group">
    <label for="f-name">Как тебя зовут</label>
    <input id="f-name" type="text" placeholder="Имя или псевдоним">
    <div class="field-error" id="err-name">Введи имя</div>
  </div>
  <div class="form-group">
    <label for="f-contact">Telegram или телефон</label>
    <input id="f-contact" type="text" placeholder="@username или +7…">
    <div class="field-error" id="err-contact">Укажи способ связи</div>
  </div>
  <div class="form-group">
    <label for="f-question">Твой вопрос или тема</label>
    <textarea id="f-question" placeholder="Опиши ситуацию или напиши «открытый запрос»"></textarea>
    <div class="field-error" id="err-question">Напиши хотя бы пару слов</div>
  </div>
</div>

<!-- SUCCESS -->
<div class="screen layer" id="screen-success">
  <div class="success-screen">
    <div class="big">🌙</div>
    <h2>Заявка принята</h2>
    <p>Я напишу тебе совсем скоро,<br>чтобы согласовать время.</p>
    <div class="divider"></div>
    <p style="color:var(--gold);font-size:.82rem;letter-spacing:.05em">До встречи в картах ✨</p>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const user = tg.initDataUnsafe?.user;
if (user?.first_name) {
  document.getElementById('greeting').textContent = `Привет, ${user.first_name} 🌙`;
}

tg.BackButton.onClick(() => { if (currentScreen === 'form') goHome(); });

// ── Stars ──
(function() {
  const sky = document.getElementById('sky');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.6 + 0.4;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*6).toFixed(1)}s;--op:${(Math.random()*.45+.15).toFixed(2)}`;
    sky.appendChild(s);
  }
})();

// ── История (localStorage) ──
const STORAGE_KEY = 'tarot_requests_v1';

function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveToHistory(spread, price) {
  const history = getHistory();
  history.unshift({
    id:     Date.now(),
    spread,
    price,
    status: 'pending',
    date:   new Date().toLocaleDateString('ru-RU'),
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

// Обновление статуса из уведомления бота
tg.onEvent('message', () => {});

function renderHistory() {
  const list = document.getElementById('history-list');
  const history = getHistory();

  if (!history.length) {
    list.innerHTML = `
      <div class="empty-history">
        <div class="big">🌙</div>
        <p>У тебя пока нет заявок</p>
      </div>`;
    return;
  }

  const statusMap = {
    pending:  { label: '🟡 Ожидает',  cls: 'status-pending' },
    accepted: { label: '🟢 Принято',  cls: 'status-accepted' },
    done:     { label: '✅ Выполнено', cls: 'status-done' },
  };

  list.innerHTML = history.map(r => {
    const s = statusMap[r.status] || statusMap.pending;
    return `
      <div class="history-item ${s.cls}">
        <div class="h-spread">${r.spread}</div>
        <div class="h-meta">${r.price} · ${r.date}</div>
        <div class="h-status">${s.label}</div>
      </div>`;
  }).join('');
}

// ── Вкладки ──
function switchTab(tab) {
  document.getElementById('tab-spreads').classList.toggle('active', tab === 'spreads');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  document.getElementById('panel-spreads').style.display = tab === 'spreads' ? 'block' : 'none';
  document.getElementById('panel-history').style.display = tab === 'history' ? 'block' : 'none';
  if (tab === 'history') {
    renderHistory();
    tg.MainButton.hide();
  } else {
    if (selectedSpread) {
      tg.MainButton.setText(`Записаться · ${selectedSpread.price}`);
      tg.MainButton.show();
    }
  }
}

// ── Расклады ──
const SPREADS = [
  { key: 'card_of_day',  icon: '🌙', name: 'Карта дня',      desc: 'Одна карта — послание на сегодня', price: '150 ₽' },
  { key: 'three_cards',  icon: '🃏', name: 'Три карты',       desc: 'Прошлое · Настоящее · Будущее',   price: '200 ₽' },
  { key: 'celtic_cross', icon: '✦',  name: 'Кельтский крест', desc: '10 карт — глубокий разбор',        price: '500 ₽' },
  { key: 'love',         icon: '❤️', name: 'На отношения',    desc: 'Что происходит между вами',        price: '300 ₽' },
  { key: 'finance',      icon: '💰', name: 'На деньги',       desc: 'Деньги, карьера, рост',            price: '300 ₽' },
  { key: 'choice',       icon: '🔀', name: 'Выбор пути',      desc: 'Два варианта — карты укажут путь', price: '300 ₽' },
];

let selectedSpread = null;
let currentScreen  = 'home';

const list = document.getElementById('spreads-list');
SPREADS.forEach(sp => {
  const el = document.createElement('div');
  el.className = 'spread-item';
  el.innerHTML = `
    <div class="icon">${sp.icon}</div>
    <div class="info">
      <div class="name">${sp.name}</div>
      <div class="desc">${sp.desc}</div>
    </div>
    <div class="price">${sp.price}</div>
  `;
  el.addEventListener('click', () => selectSpread(sp, el));
  list.appendChild(el);
});

function selectSpread(sp, el) {
  document.querySelectorAll('.spread-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedSpread = sp;
  tg.MainButton.setText(`Записаться · ${sp.price}`);
  tg.MainButton.show();
  tg.MainButton.onClick(goToForm);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  currentScreen = id;
  window.scrollTo(0, 0);
}

function goToForm() {
  if (!selectedSpread) return;
  document.getElementById('badge-name').textContent  = `${selectedSpread.icon} ${selectedSpread.name}`;
  document.getElementById('badge-price').textContent = selectedSpread.price;
  if (user?.username && !document.getElementById('f-contact').value) {
    document.getElementById('f-contact').value = '@' + user.username;
  }
  tg.MainButton.setText('Отправить заявку');
  tg.MainButton.offClick(goToForm);
  tg.MainButton.onClick(submitForm);
  tg.BackButton.show();
  showScreen('form');
}

function goHome() {
  tg.MainButton.offClick(submitForm);
  tg.MainButton.onClick(goToForm);
  if (selectedSpread) {
    tg.MainButton.setText(`Записаться · ${selectedSpread.price}`);
    tg.MainButton.show();
  } else {
    tg.MainButton.hide();
  }
  tg.BackButton.hide();
  showScreen('home');
}

async function submitForm() {
  const name     = document.getElementById('f-name').value.trim();
  const contact  = document.getElementById('f-contact').value.trim();
  const question = document.getElementById('f-question').value.trim();
  let valid = true;
  const check = (val, errId) => {
    const el = document.getElementById(errId);
    if (!val) { el.classList.add('show'); valid = false; }
    else { el.classList.remove('show'); }
  };
  check(name,     'err-name');
  check(contact,  'err-contact');
  check(question, 'err-question');
  if (!valid) return;

  tg.MainButton.showProgress();
  tg.MainButton.disable();

  // Сохраняем в историю
  saveToHistory(selectedSpread.name, selectedSpread.price);

  // Отправляем боту
  const BOT_TOKEN = "8663679950:AAH_Tnx9mtotMohwyc_KP2OK4YTuQTIq7Qk";
  const ADMIN_ID  = "1470728379";
  const userId    = user?.id || '';
  const text = `🔮 Новая заявка!\n\n🃏 Расклад: ${selectedSpread.name}\n💰 Цена: ${selectedSpread.price}\n👤 Имя: ${name}\n📱 Контакт: ${contact}\n💬 Вопрос: ${question}\n🔗 Telegram: @${user?.username || '—'} (${userId})\n\nСтатус: 🟡 Ожидает`;

  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: ADMIN_ID,
        text,
        reply_markup: {
          inline_keyboard: [[
            { text: '🟢 Принять',   callback_data: `accept:${userId}` },
            { text: '✅ Выполнено', callback_data: `done:${userId}` }
          ]]
        }
      })
    });
  } catch(e) {
    console.error(e);
  }

  tg.MainButton.hideProgress();
  tg.MainButton.hide();
  tg.BackButton.hide();
  showScreen('success');
  setTimeout(() => tg.close(), 2500);
}
</script>
</body>
</html>
